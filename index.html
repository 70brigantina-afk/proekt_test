<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #e8f0ed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Мягкий анимированный фон */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      z-index: 0;
      animation: float 12s ease-in-out infinite;
    }

    .bg-blob--1 {
      width: 420px;
      height: 420px;
      background: #b8d4cc;
      top: -120px;
      left: -80px;
    }

    .bg-blob--2 {
      width: 360px;
      height: 360px;
      background: #d4e4de;
      bottom: -100px;
      right: -60px;
      animation-delay: -4s;
    }

    .bg-blob--3 {
      width: 280px;
      height: 280px;
      background: #c9ddd6;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -8s;
      opacity: 0.3;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(20px, -15px) scale(1.05); }
      66%       { transform: translate(-15px, 10px) scale(0.97); }
    }

    .bg-blob--3 {
      animation-name: float-center;
    }

    @keyframes float-center {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%       { transform: translate(-48%, -54%) scale(1.08); }
    }

    /* Карточка */
    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 24px;
      box-shadow:
        0 4px 24px rgba(90, 130, 115, 0.1),
        0 1px 3px rgba(90, 130, 115, 0.06);
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      animation: card-in 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Заголовок */
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: fade-down 0.6s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fade-down {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #a8c9be, #7aab9a);
      border-radius: 16px;
      margin-bottom: 16px;
      font-size: 1.5rem;
      box-shadow: 0 4px 14px rgba(122, 171, 154, 0.3);
      animation: icon-pulse 3s ease-in-out infinite;
    }

    @keyframes icon-pulse {
      0%, 100% { box-shadow: 0 4px 14px rgba(122, 171, 154, 0.3); }
      50%       { box-shadow: 0 4px 22px rgba(122, 171, 154, 0.5); }
    }

    h1 {
      font-size: 1.65rem;
      font-weight: 600;
      color: #2d4a42;
      line-height: 1.35;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #7a9e92;
      font-weight: 400;
    }

    /* Список */
    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 14px;
      border: 1px solid rgba(168, 201, 190, 0.35);
      font-size: 1rem;
      color: #3a5248;
      cursor: default;
      transition:
        transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.3s ease,
        border-color 0.3s ease,
        background 0.3s ease;
      animation: item-in 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    li:nth-child(1) { animation-delay: 0.3s; }
    li:nth-child(2) { animation-delay: 0.42s; }
    li:nth-child(3) { animation-delay: 0.54s; }

    @keyframes item-in {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    li:hover {
      transform: translateX(6px) scale(1.01);
      background: rgba(255, 255, 255, 0.95);
      border-color: rgba(122, 171, 154, 0.55);
      box-shadow: 0 6px 20px rgba(90, 130, 115, 0.12);
    }

    .item-number {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #c5ddd4, #a8c9be);
      color: #3d6b5c;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 10px;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    li:hover .item-number {
      transform: rotate(-8deg) scale(1.1);
    }

    .item-text {
      line-height: 1.4;
    }

    /* Декоративная линия под списком */
    .footer-line {
      margin-top: 32px;
      height: 3px;
      border-radius: 3px;
      background: linear-gradient(90deg, transparent, #a8c9be, transparent);
      animation: line-grow 1s 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      transform-origin: center;
    }

    @keyframes line-grow {
      from { opacity: 0; transform: scaleX(0); }
      to   { opacity: 1; transform: scaleX(1); }
    }
  </style>
</head>
<body>

  <div class="bg-blob bg-blob--1"></div>
  <div class="bg-blob bg-blob--2"></div>
  <div class="bg-blob bg-blob--3"></div>

  <div class="container">
    <div class="header">
      <div class="header-icon">✦</div>
      <h1>Генератор идей для постов</h1>
      <p class="subtitle">Выберите формат — и начинайте творить</p>
    </div>

    <ul>
      <li>
        <span class="item-number">01</span>
        <span class="item-text">5 идей постов для экспертов</span>
      </li>
      <li>
        <span class="item-number">02</span>
        <span class="item-text">3 идеи сторис на сегодня</span>
      </li>
      <li>
        <span class="item-number">03</span>
        <span class="item-text">Контент план на неделю</span>
      </li>
    </ul>

    <div class="footer-line"></div>
  </div>

</body>
</html>
